<!doctype html>
<html lang="fr" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>BEYA CREATIVE - Excellence en Confection Textile au Maroc</title>
    <script>
      (function() {
        var h = window.location.hostname;
        var isMainDomain = h === 'beyacreative.com' || h === 'www.beyacreative.com' || h === 'app.beyacreative.com' || h === 'localhost' || h.includes('vercel.app');
        if (!isMainDomain) {
           var name = h.split('.')[0];
           document.title = name.charAt(0).toUpperCase() + name.slice(1);
           
           // Remove meta description to avoid Beya's text showing up
           var metaDesc = document.querySelector('meta[name="description"]');
           if (metaDesc) metaDesc.remove();
           
           // Remove favicon to avoid flashing BEYA logo
           window.addEventListener('DOMContentLoaded', function() {
              document.querySelectorAll("link[rel*='icon']").forEach(function(link) {
                 link.href = ''; 
              });
           });
        }
      })();
    </script>
    <!-- SEO Meta Tags -->
    <meta name="description" content="BEYA CREATIVE : Leader de la confection textile au Maroc. Fabrication de vêtements de haute qualité : T-shirts, Polos, Hoodies, Djellabas et Uniformes. Production 100% Marocaine." />
    <meta name="keywords" content="confection textile maroc, fabrication vetements casablanca, usine textile maroc, t-shirt oversize maroc, grossiste vetement maroc, beya creative, textile morocco" />
    <meta name="author" content="BEYA CREATIVE" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://beyacreative.com/" />
    <meta property="og:title" content="BEYA CREATIVE - Excellence en Confection Textile 🇲🇦" />
    <meta property="og:description" content="Votre partenaire stratégique pour la production de vêtements au Maroc. Qualité, Rapidité et Expertise." />
    <meta property="og:image" content="https://beyacreative.com/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="BEYA CREATIVE - Confection Textile Maroc" />
    <meta property="twitter:description" content="Production de vêtements haute qualité au Maroc." />
    <meta property="twitter:image" content="https://beyacreative.com/logo.png" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Preconnect to external services for faster loading -->
    <link rel="preconnect" href="https://supabase.co" />
    <link rel="preconnect" href="https://connect.facebook.net" />
    <link rel="dns-prefetch" href="https://supabase.co" />


  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
