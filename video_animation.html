<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEYA Pattern Making & Sewing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        .video-container {
            width: 1080px;
            height: 1920px;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 9/16;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
            overflow: hidden;
            transform-origin: center;
        }

        .title {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0;
        }

        .subtitle {
            position: absolute;
            top: 22%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2rem;
            color: #94a3b8;
            opacity: 0;
        }

        svg.main-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .pattern-line {
            fill: none;
            stroke: #38bdf8;
            stroke-width: 6;
            stroke-linecap: round;
        }

        .fabric {
            fill: #334155;
            opacity: 0;
            stroke: #475569;
            stroke-width: 4;
        }

        .scissors {
            position: absolute;
            width: 120px;
            height: 120px;
            opacity: 0;
            z-index: 10;
        }

        .needle {
            position: absolute;
            width: 60px;
            height: 160px;
            opacity: 0;
            z-index: 10;
        }

        .brand {
            position: absolute;
            bottom: 5%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>

    <div class="video-container" id="video">
        <div class="title" id="mainTitle">Pattern Making</div>
        <div class="subtitle" id="subTitle">Mastering the Techniques</div>

        <svg class="main-canvas" viewBox="0 0 1080 1920">
            <!-- Fabric piece -->
            <path id="fabric" class="fabric" d="M 200 600 L 880 600 L 880 1400 L 200 1400 Z" rx="20"/>
            
            <!-- Pattern Outline to draw -->
            <path id="patternPath" class="pattern-line" style="stroke-dasharray: 20, 15;" d="M 300 700 C 400 600, 680 600, 780 700 C 850 800, 850 1200, 780 1300 C 680 1400, 400 1400, 300 1300 C 200 1200, 200 800, 300 700 Z"/>

            <!-- Sewing thread path -->
            <path id="sewingPath" class="pattern-line" style="stroke: #fcd34d; stroke-dasharray: 15, 15; stroke-width: 8;" d="M 320 720 C 400 640, 680 640, 760 720 C 820 800, 820 1200, 760 1280 C 680 1360, 400 1360, 320 1280 C 240 1200, 240 800, 320 720 Z" />
        </svg>

        <!-- Scissor Image/SVG -->
        <div class="scissors" id="scissors">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="6" cy="6" r="3"></circle>
                <circle cx="6" cy="18" r="3"></circle>
                <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
                <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
                <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
            </svg>
        </div>

        <!-- Needle SVG -->
        <div class="needle" id="needle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="2" x2="12" y2="22"></line>
                <circle cx="12" cy="4" r="1"></circle>
            </svg>
        </div>

        <div class="brand">BEYA CREATIVE</div>
    </div>

    <script>
        gsap.registerPlugin(MotionPathPlugin);

        // Responsive scaling
        function resize() {
            const container = document.getElementById('video');
            const targetRatio = 1080 / 1920;
            const windowRatio = window.innerWidth / window.innerHeight;
            
            let scale;
            if (windowRatio < targetRatio) {
                scale = (window.innerWidth * 0.9) / 1080;
            } else {
                scale = (window.innerHeight * 0.9) / 1920;
            }
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resize);
        resize();

        // Setup paths
        const patternPath = document.getElementById('patternPath');
        const patternLength = patternPath.getTotalLength();
        gsap.set(patternPath, { strokeDasharray: `${patternLength}`, strokeDashoffset: patternLength });

        const sewingPath = document.getElementById('sewingPath');
        const sewingLength = sewingPath.getTotalLength();
        gsap.set(sewingPath, { strokeDasharray: `${sewingLength}`, strokeDashoffset: sewingLength });

        // Timeline
        const tl = gsap.timeline({ repeat: -1, repeatDelay: 2 }); // Loop

        // 1. Intro
        tl.to("#mainTitle", { opacity: 1, y: -20, duration: 1, ease: "power3.out" })
          .to("#subTitle", { opacity: 1, y: -10, duration: 1, ease: "power3.out" }, "-=0.5")
          .to("#fabric", { opacity: 1, duration: 1 }, "-=0.5");

        // 2. Draw Pattern
        tl.to(patternPath, { strokeDashoffset: 0, duration: 3, ease: "power1.inOut" });

        // 3. Scissors Cutting
        tl.set("#scissors", { opacity: 1 })
          .to("#scissors", {
            duration: 4,
            ease: "none",
            motionPath: {
                path: "#patternPath",
                align: "#patternPath",
                alignOrigin: [0.5, 0.5],
                autoRotate: true
            }
          }, "-=0.5")
          .to("#scissors", { scale: 1.2, yoyo: true, repeat: 15, duration: 0.25 }, "-=4")
          .to("#scissors", { opacity: 0, duration: 0.5 });

        // 4. Change title to Sewing
        tl.to("#mainTitle", { opacity: 0, duration: 0.5 })
          .to("#subTitle", { opacity: 0, duration: 0.5 }, "-=0.5")
          .set("#mainTitle", { textContent: "SEWING TECHNIQUES" })
          .set("#subTitle", { textContent: "Precision & Quality" })
          .to("#mainTitle", { opacity: 1, duration: 0.5 })
          .to("#subTitle", { opacity: 1, duration: 0.5 }, "-=0.5");

        // 5. Sewing animation
        tl.set("#needle", { opacity: 1 })
          .to("#needle", {
            duration: 4,
            ease: "none",
            motionPath: {
                path: "#sewingPath",
                align: "#sewingPath",
                alignOrigin: [0.5, 1],
                autoRotate: true
            }
          })
          .to(sewingPath, { strokeDashoffset: 0, duration: 4, ease: "none" }, "-=4")
          .to("#needle", { y: "+=20", yoyo: true, repeat: 31, duration: 0.125 }, "-=4")
          .to("#needle", { opacity: 0, duration: 0.5 });

        // 6. Outro
        tl.to(".brand", { scale: 1.1, textShadow: "0 0 20px rgba(255,255,255,0.8)", duration: 1, yoyo: true, repeat: 1 });

    </script>
</body>
</html>
